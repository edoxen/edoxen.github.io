<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 64" width="280" height="64" role="img" aria-label="Edoxen">
  <title>Edoxen</title>
  <desc>Wordmark with stoichedon mark — the Greek letters ΕΔΟΞΕΝ in a 3×2 inscription grid, after the Athenian decree-stele.</desc>

  <defs>
    <linearGradient id="edoxen-brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e7490"/>
      <stop offset="100%" stop-color="#035a8f"/>
    </linearGradient>
  </defs>

  <!-- Stoichedon mark: 60×60 inscription block, the formula ΕΔΟΞΕΝ -->
  <g stroke="#0c4a6e" stroke-width="3" stroke-linecap="square" fill="none">
    <rect x="2" y="2" width="60" height="60" rx="2"/>
    <line x1="22" y1="3" x2="22" y2="61"/>
    <line x1="42" y1="3" x2="42" y2="61"/>
    <line x1="3" y1="32" x2="61" y2="32"/>
  </g>
  <g fill="#0c4a6e"
     font-family="'Iowan Old Style','Palatino Linotype',Palatino,'Book Antiqua',Georgia,'Times New Roman',serif"
     font-size="18" font-weight="700" text-anchor="middle" dominant-baseline="central">
    <text x="12" y="17">Ε</text>
    <text x="32" y="17">Δ</text>
    <text x="52" y="17">Ο</text>
    <text x="12" y="47">Ξ</text>
    <text x="32" y="47">Ε</text>
    <text x="52" y="47">Ν</text>
  </g>

  <!-- Wordmark: serif that recalls cut-stone inscriptions -->
  <text x="76" y="42"
        font-family="'Iowan Old Style','Palatino Linotype',Palatino,'Book Antiqua',Georgia,'Times New Roman',serif"
        font-size="32" font-weight="500" letter-spacing="0.5"
        fill="url(#edoxen-brand)">Edoxen</text>
</svg>
