<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96" role="img" aria-label="Edoxen stoichedon mark">
  <title>Edoxen</title>
  <desc>The stoichedon block — a 3×2 inscription of the formula ΕΔΟΞΕΝ, from which the project name derives.</desc>

  <!-- 3×2 stoichedon block, inked -->
  <g stroke="#0c4a6e" stroke-width="4" stroke-linecap="square" fill="none">
    <rect x="4" y="4" width="88" height="88" rx="3"/>
    <line x1="33.33" y1="5" x2="33.33" y2="91"/>
    <line x1="62.67" y1="5" x2="62.67" y2="91"/>
    <line x1="5" y1="48" x2="91" y2="48"/>
  </g>
  <g fill="#0c4a6e"
     font-family="'Iowan Old Style','Palatino Linotype',Palatino,'Book Antiqua',Georgia,'Times New Roman',serif"
     font-size="28" font-weight="700" text-anchor="middle" dominant-baseline="central">
    <text x="18.67" y="26">Ε</text>
    <text x="48" y="26">Δ</text>
    <text x="77.33" y="26">Ο</text>
    <text x="18.67" y="70">Ξ</text>
    <text x="48" y="70">Ε</text>
    <text x="77.33" y="70">Ν</text>
  </g>
</svg>
